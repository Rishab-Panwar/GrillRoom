<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="hsl(24,18%,17%)"/>
      <stop offset="55%" stop-color="hsl(22,20%,11%)"/>
      <stop offset="100%" stop-color="hsl(20,22%,8%)"/>
    </linearGradient>
    <linearGradient id="brass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="hsl(42,48%,60%)"/>
      <stop offset="100%" stop-color="hsl(40,38%,34%)"/>
    </linearGradient>
    <radialGradient id="leak" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="hsl(32,85%,55%)" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="hsl(32,85%,55%)" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- dark warm plaque -->
  <rect width="32" height="32" rx="6" fill="hsl(20,14%,7%)"/>
  <!-- warm light leaking from behind the door -->
  <ellipse cx="22" cy="16" rx="9" ry="13" fill="url(#leak)"/>
  <!-- wood door -->
  <rect x="9" y="4.5" width="13" height="23" rx="1.5" fill="url(#wood)" stroke="hsl(20,15%,5%)" stroke-width="0.8"/>
  <!-- carved panels -->
  <rect x="11" y="6.5" width="9" height="7.5" rx="0.5" fill="none" stroke="hsl(20,12%,6%)" stroke-width="0.8"/>
  <rect x="11" y="15.5" width="9" height="10" rx="0.5" fill="none" stroke="hsl(20,12%,6%)" stroke-width="0.8"/>
  <!-- brass nameplate -->
  <rect x="12.5" y="8.5" width="6" height="3.5" rx="0.4" fill="url(#brass)"/>
  <!-- brass knob -->
  <circle cx="20" cy="16" r="1.4" fill="url(#brass)"/>
</svg>
